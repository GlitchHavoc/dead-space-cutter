<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dead Space Cutter</title>
  <link rel="stylesheet" href="/public/styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel primary">
      <div class="topbar">
        <div>
          <p class="eyebrow">Local Video Tool</p>
          <h1>Dead Space Cutter</h1>
        </div>
        <button id="processBtn" class="run">Process Video</button>
      </div>

      <label class="drop" for="video">
        <input id="video" name="video" type="file" accept="video/*" />
        <span>Choose video</span>
        <strong id="fileName">No file selected</strong>
      </label>

      <div class="preview">
        <video id="preview" controls playsinline></video>
      </div>
    </section>

    <section class="panel controls">
      <h2>Dead Space</h2>
      <div class="grid">
        <label class="check"><input id="cutDeadspace" type="checkbox" checked /> Cut dead space</label>
        <label>Dead space length
          <input id="deadspace" type="number" min="0.05" step="0.05" value="0.20" />
        </label>
        <label>Silence threshold
          <select id="threshold">
            <option value="-30dB">Loud room (-30dB)</option>
            <option value="-35dB" selected>Normal (-35dB)</option>
            <option value="-42dB">Quiet room (-42dB)</option>
          </select>
        </label>
        <label class="check"><input id="smoothAudio" type="checkbox" checked /> Smooth audio cuts</label>
        <label>Fade length
          <input id="audioFade" type="number" min="0.01" max="0.20" step="0.01" value="0.03" />
        </label>
      </div>

      <h2>Captions</h2>
      <div class="grid">
        <label class="check"><input id="addCaptions" type="checkbox" /> Add viral captions</label>
        <label>Caption style
          <select id="captionStyle">
            <option value="viral">TikTok red highlight</option>
          </select>
        </label>
        <label>Caption grouping
          <select id="captionMode">
            <option value="max4" selected>Up to 4 words</option>
            <option value="oneword">One word at a time</option>
          </select>
        </label>
        <label>Font size
          <input id="captionSize" type="number" min="36" max="150" value="76" />
        </label>
      </div>
      <textarea id="captionText" placeholder="Paste your script or SRT here. Plain text will be timed across the video; SRT keeps its timings."></textarea>
    </section>

    <section class="panel output">
      <h2>Export</h2>
      <div id="status" class="status">Ready</div>
      <pre id="log"></pre>
      <video id="result" controls playsinline></video>
      <a id="download" class="download" href="#" download>Download MP4</a>
    </section>
  </main>
  <script src="/public/app.js"></script>
</body>
</html>
